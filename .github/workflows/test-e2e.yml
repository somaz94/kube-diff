name: E2E Tests

on:
  push:
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  test-e2e:
    name: E2E Demo
    # Gate the kind-based e2e on fork PRs: push/dispatch and same-repo PRs
    # always run; a fork PR runs only after a maintainer comments /ok-to-test
    # (which applies the ok-to-test label).
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'ok-to-test')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build binary
        run: |
          make build
          sudo mv kube-diff /usr/local/bin/

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --wait 60s

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4
          token: ${{ github.token }}

      - name: Install Kustomize
        run: |
          # Pin a release and download the asset directly. The upstream
          # install_kustomize.sh queries the GitHub API unauthenticated and
          # flakes on rate limits, leaving no tarball for tar to open.
          KUSTOMIZE_VERSION=v5.5.0
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" -o kustomize.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Run e2e demo
        run: make demo

      - name: Clean up demo
        run: make demo-clean
