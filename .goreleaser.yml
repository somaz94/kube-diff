version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/main.go
    binary: kube-diff
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/somaz94/kube-diff/cmd/cli.version={{.Version}}
      - -X github.com/somaz94/kube-diff/cmd/cli.commit={{.Commit}}
      - -X github.com/somaz94/kube-diff/cmd/cli.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  groups:
    - title: "Features"
      regexp: '^feat'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix'
      order: 1
    - title: "Performance"
      regexp: '^perf'
      order: 2
    - title: "Refactoring"
      regexp: '^refactor'
      order: 3
    - title: "Build"
      regexp: '^build'
      order: 4
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - '^docs: update changelog'
      - '^docs: update CONTRIBUTORS'
      - '^Merge'
      - '^Auto commit'

release:
  github:
    owner: somaz94
    name: kube-diff
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: somaz94
      name: homebrew-tap
    homepage: "https://github.com/somaz94/kube-diff"
    description: "Compare local Kubernetes manifests against live cluster state"
    license: "Apache-2.0"
    install: |
      bin.install "kube-diff"
    test: |
      system "#{bin}/kube-diff", "version"
    caveats: |
      🎉 kube-diff installed!

      Quick start:
        kube-diff file <path>              # Compare YAML files vs cluster
        kube-diff helm <chart> -r <name>   # Compare Helm chart vs cluster
        kube-diff kustomize <path>         # Compare Kustomize vs cluster
        kube-diff --help                   # Full usage

      Docs: https://github.com/somaz94/kube-diff

scoops:
  - repository:
      owner: somaz94
      name: scoop-bucket
    homepage: "https://github.com/somaz94/kube-diff"
    description: "Compare local Kubernetes manifests against live cluster state"
    license: "Apache-2.0"

krews:
  - name: diff2
    repository:
      owner: somaz94
      name: krew-index
    homepage: "https://github.com/somaz94/kube-diff"
    description: "Compare local Kubernetes manifests against live cluster state"
    short_description: "Diff local K8s manifests vs cluster"
